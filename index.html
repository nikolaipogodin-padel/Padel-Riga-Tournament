<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padel Riga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1 class="neon-title">Padel Riga</h1>
        </header>

        <main id="main-content">
            <section id="screen-tournaments" class="screen active">
                <div class="section-label">Мои активные матчи</div>
                <div id="my-matches-list"></div>
                <div class="section-label">Предстоящие турниры</div>
                <div id="future-list"></div>
            </section>

            <section id="screen-matches" class="screen">
                <div class="section-label">Прямой эфир (Все корты)</div>
                <div id="all-matches-list"></div>
            </section>

            <section id="screen-stats" class="screen">
                <div class="section-label">Рейтинг игроков</div>
                <div id="leaderboard-list"></div>
            </section>

            <section id="screen-profile" class="screen">
                <div class="profile-card">
                    <div class="avatar">👤</div>
                    <h2>Николай Рига</h2>
                    <div class="badge">PRO PLAYER</div>
                    <div class="stats-row">
                        <div><span>Rating</span><br>1450</div>
                        <div><span>Wins</span><br>24</div>
                        <div><span>Rank</span><br>#4</div>
                    </div>
                </div>
            </section>
        </main>

        <div id="modal-score" class="modal">
            <div class="modal-content">
                <button class="close-modal" onclick="App.closeScore()">✕</button>
                <h3 id="edit-match-names">Счет матча</h3>
                <div class="score-input-zone">
                    <input type="number" id="s1" class="big-input">
                    <span class="divider">:</span>
                    <input type="number" id="s2" class="big-input">
                </div>
                <button class="save-btn" onclick="App.saveScore()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-btn active" onclick="App.switchTab('tournaments', this)">🏆</div>
            <div class="nav-btn" onclick="App.switchTab('matches', this)">🎾</div>
            <div class="nav-btn" onclick="App.switchTab('stats', this)">📊</div>
            <div class="nav-btn" onclick="App.switchTab('profile', this)">👥</div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
