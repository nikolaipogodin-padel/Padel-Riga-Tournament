<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Padel Riga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="sticky top-0 z-40 px-6 py-5 bg-[#0A0A0A]/80 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-[#BFFF00] rounded-xl flex items-center justify-center font-black text-black shadow-[0_0_15px_rgba(191,255,0,0.3)]">P</div>
            <span class="text-xl font-black uppercase tracking-tighter text-white">Padel <span class="text-[#BFFF00]">Riga</span></span>
        </div>
        <div id="status-badge" class="hidden text-[10px] font-bold bg-white/5 px-3 py-1 rounded-full border border-white/10 uppercase tracking-widest text-gray-500">Live Sync</div>
    </header>

    <main id="app-container">
        <section id="screen-registration" class="screen">
            <div class="p-6 pt-2">
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <input type="text" id="reg-firstname" placeholder="Имя" autocomplete="given-name" class="flex-1 p-4 premium-card outline-none text-white">
                        <input type="text" id="reg-lastname" placeholder="Фамилия" autocomplete="family-name" class="flex-1 p-4 premium-card outline-none text-white">
                    </div>
                    
                    <div class="flex gap-3">
                        <input type="text" value="+371" readonly class="w-20 p-4 premium-card outline-none text-gray-500 text-center">
                        <input type="tel" id="reg-phone" placeholder="Номер телефона" autocomplete="tel-national" class="flex-1 p-4 premium-card outline-none text-white">
                    </div>

                    <div class="flex gap-3">
                        <select id="reg-gender" class="flex-1 p-4 premium-card outline-none text-white appearance-none">
                            <option value="" disabled selected>Пол</option>
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                        <select id="reg-level" class="flex-1 p-4 premium-card outline-none text-white appearance-none">
                            <option value="4.0">Уровень 4.0</option>
                            <option value="3.0">Уровень 3.0</option>
                            <option value="5.0">Уровень 5.0</option>
                        </select>
                    </div>

                    <input type="password" id="reg-password" placeholder="Пароль" autocomplete="new-password" class="w-full p-4 premium-card outline-none text-white">

                    <button onclick="auth.signUp()" id="reg-btn" class="w-full py-5 bg-[#BFFF00] text-black font-black rounded-2xl uppercase mt-4 active:scale-95 transition-transform">Регистрация</button>
                </div>
            </div>
        </section>

        <section id="screen-tournaments" class="screen">
            <div class="p-6">
                <h2 class="text-2xl font-black uppercase text-white mb-6 italic">Турниры</h2>
                <div id="tournament-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="screen-profile" class="screen">
            <div class="flex flex-col items-center pt-10 pb-8">
                <div class="w-20 h-20 rounded-3xl bg-[#BFFF00] flex items-center justify-center text-3xl mb-4 shadow-lg shadow-[#BFFF00]/20">👤</div>
                <h2 id="p-name" class="text-2xl font-black uppercase text-white">---</h2>
                <p id="p-id" class="text-gray-600 text-[10px] font-black uppercase mt-1 tracking-widest italic">ID: ---</p>
            </div>
            <div class="px-6">
                <button onclick="auth.logout()" class="w-full py-4 text-red-500/80 text-[10px] font-black uppercase tracking-widest border border-red-500/10 rounded-2xl">Выйти из аккаунта</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" id="nav-tournaments" onclick="ui.navigate('screen-tournaments')">🏆</button>
        <button class="nav-item" id="nav-profile" onclick="ui.navigate('screen-profile')">👤</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
