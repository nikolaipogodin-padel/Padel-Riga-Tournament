<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    </style>
</head>
<body class="p-4">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-blue-400">Padel Riga Tracker</h1>
        <p class="text-slate-400">Система управления турниром</p>
    </header>

    <div class="card border-l-4 border-blue-500">
        <h2 class="text-xl font-semibold mb-4 text-blue-300">Настройка турнира</h2>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs uppercase text-slate-500 mb-1">Кол-во пар</label>
                <select id="pairs" class="w-full bg-slate-700 p-2 rounded">
                    <option value="4">4 пары (2 корта)</option>
                    <option value="6">6 пар (3 корта)</option>
                    <option value="8" selected>8 пар (4 корта)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs uppercase text-slate-500 mb-1">Время (мин)</label>
                <input type="number" id="totalTime" value="120" class="w-full bg-slate-700 p-2 rounded">
            </div>
        </div>
        <button onclick="calculate()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold">Рассчитать тайминг</button>
    </div>

    <div id="result" class="hidden card bg-blue-900/20 border border-blue-500/30">
        <div class="flex justify-between text-center">
            <div><p class="text-xs text-slate-400">ИГРА</p><p id="gameTime" class="text-2xl font-bold text-white"></p></div>
            <div><p class="text-xs text-slate-400">ОТДЫХ</p><p id="restTime" class="text-2xl font-bold text-white"></p></div>
            <div><p class="text-xs text-slate-400">ТУРОВ</p><p id="rounds" class="text-2xl font-bold text-white"></p></div>
        </div>
    </div>

    <script>
        function calculate() {
            const pairs = parseInt(document.getElementById('pairs').value);
            const total = parseInt(document.getElementById('totalTime').value);
            const rounds = pairs - 1;
            
            // Твоя логика: общее / туры, округляем вниз до 5 мин или просто целых
            let rawGame = Math.floor(total / rounds);
            let gameTime = rawGame > 15 ? 15 : rawGame - 2; // Базово 15 мин
            if (rawGame > 20) gameTime = 20;

            let totalGameTime = gameTime * rounds;
            let totalRest = total - totalGameTime;
            let restPerBreak = (totalRest / (rounds - 1)).toFixed(1);

            document.getElementById('gameTime').innerText = gameTime + ' мин';
            document.getElementById('restTime').innerText = restPerBreak + ' мин';
            document.getElementById('rounds').innerText = rounds;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
