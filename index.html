<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Riga App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4 font-sans">
    
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter italic">PADEL RIGA</h1>
            <div class="h-8 w-8 bg-blue-500 rounded-full flex items-center justify-center text-xs">NP</div>
        </header>

        <div id="tournamentCard" class="bg-slate-900 rounded-3xl p-6 border border-slate-800 shadow-2xl transition-all duration-500">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="statusBadge" class="bg-green-500/10 text-green-500 text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider">Открыт</span>
                    <h2 class="text-2xl font-bold mt-2">Americano Sunday</h2>
                    <p class="text-slate-500 text-sm italic">8 пар • 4 корта • 120 мин</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase">Места</p>
                    <p id="slotDisplay" class="text-xl font-black text-blue-400">0/16</p>
                </div>
            </div>

            <div id="actionArea">
                <input type="text" id="playerName" placeholder="Твое Имя" 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="registerPlayer()" 
                        class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                    ЗАПИСАТЬСЯ
                </button>
            </div>

            <div id="closedMessage" class="hidden text-center py-4 bg-slate-800/50 rounded-2xl border border-dashed border-slate-700">
                <p class="text-slate-400 font-medium italic">Регистрация закрыта. Мест нет.</p>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-slate-600 uppercase tracking-[0.2em] mb-4">Подтвержденные игроки</h3>
            <div id="playerList" class="grid grid-cols-2 gap-2">
                </div>
        </div>
    </div>

    <script>
        let count = 0;
        const limit = 16;

        function registerPlayer() {
            const name = document.getElementById('playerName').value;
            if(!name) return alert("Введи имя!");

            count++;
            
            // Добавляем в список
            const list = document.getElementById('playerList');
            list.innerHTML += `<div class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-sm font-medium animate-pulse">${count}. ${name}</div>`;
            
            // Обновляем счетчик
            document.getElementById('slotDisplay').innerText = `${count}/${limit}`;
            document.getElementById('playerName').value = "";

            // Проверка на закрытие
            if(count >= limit) {
                document.getElementById('actionArea').classList.add('hidden');
                document.getElementById('closedMessage').classList.remove('hidden');
                document.getElementById('statusBadge').innerText = "Закрыт";
                document.getElementById('statusBadge').className = "bg-red-500/10 text-red-500 text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider";
                document.getElementById('tournamentCard').classList.add('opacity-75');
            }
        }
    </script>
</body>
</html>
