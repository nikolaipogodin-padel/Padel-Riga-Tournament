<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padel Riga Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1 class="neon-title">Padel Riga</h1>
    </header>

    <main id="main-content">
        <section id="screen-tournaments" class="screen active">
            <div class="label">Мои активные матчи</div>
            <div id="my-list"></div>
            <div class="label">Будущие турниры</div>
            <div id="future-list"></div>
        </section>

        <section id="screen-matches" class="screen">
            <div class="label">Прямой эфир / Все корты</div>
            <div id="live-list"></div>
        </section>

        <section id="screen-stats" class="screen">
            <div class="label">Топ игроков сезона</div>
            <div id="stats-list"></div>
        </section>

        <section id="screen-profile" class="screen">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <h2>Николай Рига</h2>
                <div class="rank-badge">GOLD CLASS</div>
                <div class="stats-grid">
                    <div><small>Rating</small><br><b>1450</b></div>
                    <div><small>Matches</small><br><b>32</b></div>
                    <div><small>Wins</small><br><b>24</b></div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-score" class="modal">
        <div class="modal-body">
            <button class="modal-close" onclick="App.closeScore()">✕</button>
            <h3 id="m-names">Счет матча</h3>
            <div class="score-inputs">
                <input type="number" id="s1" class="score-input">
                <span class="sep">:</span>
                <input type="number" id="s2" class="score-input">
            </div>
            <button class="save-btn" onclick="App.saveScore()">СОХРАНИТЬ</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="App.switchTab('tournaments', this)">🏆</div>
        <div class="nav-item" onclick="App.switchTab('matches', this)">🎾</div>
        <div class="nav-item" onclick="App.switchTab('stats', this)">📊</div>
        <div class="nav-item" onclick="App.switchTab('profile', this)">👥</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
