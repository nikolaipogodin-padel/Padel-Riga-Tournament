<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Padel Riga Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body text-white font-inter">
  <div id="app-shell" class="app-shell">
    <header id="main-header" class="main-header">
      <div>
        <p class="eyebrow">Padel Riga</p>
        <h1 class="brand-title">PADEL RIGA</h1>
      </div>
      <button class="ghost-pill" type="button" onclick="router.navigate('profile')">Регистрация</button>
    </header>

    <main id="screen-content" class="screen-content"></main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="dashboard" onclick="router.navigate('dashboard')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5 9.5V20h14V9.5"></path>
          </svg>
        </span>
        <span>Dashboard</span>
      </button>

      <button class="nav-item" data-screen="live" onclick="router.navigate('live')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"></path>
            <path d="M4.9 4.9A10 10 0 0 0 2 12"></path>
            <path d="M19.1 4.9A10 10 0 0 1 22 12"></path>
            <path d="M4.9 19.1A10 10 0 0 1 2 12"></path>
            <path d="M19.1 19.1A10 10 0 0 0 22 12"></path>
          </svg>
        </span>
        <span>LIVE</span>
      </button>

      <button class="nav-item" data-screen="grid" onclick="router.navigate('grid')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
          </svg>
        </span>
        <span>Grid</span>
      </button>

      <button class="nav-item" data-screen="stats" onclick="router.navigate('stats')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5 19V9"></path>
            <path d="M12 19V5"></path>
            <path d="M19 19v-7"></path>
          </svg>
        </span>
        <span>Stats</span>
      </button>

      <button class="nav-item" data-screen="profile" onclick="router.navigate('profile')">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        </span>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
