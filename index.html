<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Padel Riga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="sticky top-0 z-40 px-6 py-4 bg-[#0A0A0A]/80 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#BFFF00] rounded-lg flex items-center justify-center font-black text-black">P</div>
            <span class="text-lg font-black uppercase tracking-tighter text-white">Padel <span class="text-[#BFFF00]">Riga</span></span>
        </div>
        <div id="status-badge" class="hidden text-[9px] font-bold bg-[#BFFF00]/10 text-[#BFFF00] px-2 py-1 rounded-full border border-[#BFFF00]/20 uppercase">Cloud Sync</div>
    </header>

    <main id="app-container">
        <section id="screen-registration" class="screen">
            <div class="px-6 pt-2">
                <div class="flex flex-col items-center mb-6">
                    <div class="relative w-24 h-24 bg-[#1A1A1A] rounded-full border-2 border-dashed border-white/10 flex items-center justify-center overflow-hidden shadow-2xl">
                        <span class="text-3xl">👤</span>
                        <div class="absolute bottom-0 right-0 w-8 h-8 bg-[#BFFF00] rounded-full flex items-center justify-center text-black font-bold border-4 border-[#0A0A0A]">+</div>
                    </div>
                    <p class="text-[10px] text-gray-500 uppercase mt-2 font-bold tracking-widest">Добавить фото</p>
                </div>

                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="reg-firstname" placeholder="Имя" class="p-4 premium-card outline-none text-white text-sm">
                        <input type="text" id="reg-lastname" placeholder="Фамилия" class="p-4 premium-card outline-none text-white text-sm">
                    </div>
                    
                    <div class="flex gap-3">
                        <div class="p-4 premium-card text-gray-500 text-sm w-16 text-center">+371</div>
                        <input type="tel" id="reg-phone" placeholder="Номер телефона" class="flex-1 p-4 premium-card outline-none text-white text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <select id="reg-gender" class="p-4 premium-card text-white text-sm appearance-none">
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                        <select id="reg-level" class="p-4 premium-card text-white text-sm appearance-none">
                            <option value="4.0">Уровень 4.0</option>
                            <option value="3.0">Уровень 3.0</option>
                            <option value="5.0">Уровень 5.0</option>
                        </select>
                    </div>

                    <input type="password" id="reg-password" placeholder="Придумайте пароль" class="w-full p-4 premium-card outline-none text-white text-sm">

                    <button onclick="auth.signUp()" id="reg-btn" class="w-full py-5 bg-[#BFFF00] text-black font-black rounded-2xl uppercase mt-4 shadow-[0_10px_30px_rgba(191,255,0,0.2)] active:scale-95 transition-all">Регистрация</button>
                </div>
            </div>
        </section>

        <section id="screen-tournaments" class="screen">
            <div class="p-6">
                <h2 class="text-2xl font-black uppercase text-white mb-6 italic">Турниры</h2>
                <div id="tournament-list" class="space-y-6">
                    </div>
            </div>
        </section>

        <section id="screen-profile" class="screen">
            <div class="flex flex-col items-center pt-10 pb-8">
                <div class="w-24 h-24 rounded-[32px] bg-[#1A1A1A] border border-white/10 flex items-center justify-center text-4xl mb-4 shadow-[0_20px_40px_rgba(0,0,0,0.5)]">👤</div>
                <h2 id="p-name" class="text-2xl font-black uppercase text-white">---</h2>
                <p id="p-id" class="text-gray-600 text-[10px] font-black uppercase mt-1 tracking-widest italic">ID: ---</p>
            </div>
            <div class="px-6">
                <button onclick="auth.logout()" class="w-full py-4 text-red-500/80 text-[10px] font-black uppercase tracking-widest border border-red-500/10 rounded-2xl">Выйти из аккаунта</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" id="nav-tournaments" onclick="ui.navigate('screen-tournaments')">🏆</button>
        <button class="nav-item" id="nav-profile" onclick="ui.navigate('screen-profile')">👤</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
