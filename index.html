<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padel Riga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white font-['Inter'] antialiased overflow-x-hidden">

    <main id="app" class="pb-32 min-h-screen">
        <div id="screen-content"></div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-slate-900/80 backdrop-blur-2xl border border-white/10 rounded-[32px] h-20 flex items-center justify-around px-4 z-50 shadow-2xl">
        <button onclick="switchScreen('dashboard')" class="nav-item group active" data-screen="dashboard">
            <div class="flex flex-col items-center">
                <svg class="w-6 h-6 mb-1 opacity-40 group-[.active]:opacity-100 group-[.active]:text-blue-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[9px] uppercase tracking-tighter opacity-40 group-[.active]:opacity-100">Home</span>
            </div>
        </button>
        <button onclick="switchScreen('tournaments')" class="nav-item group" data-screen="tournaments">
            <div class="flex flex-col items-center">
                <svg class="w-6 h-6 mb-1 opacity-40 group-[.active]:opacity-100 group-[.active]:text-blue-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="text-[9px] uppercase tracking-tighter opacity-40 group-[.active]:opacity-100">Турниры</span>
            </div>
        </button>
        <button onclick="switchScreen('live')" class="nav-item group" data-screen="live">
            <div class="flex flex-col items-center">
                <div class="relative">
                    <svg class="w-6 h-6 mb-1 opacity-40 group-[.active]:opacity-100 group-[.active]:text-green-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15.536a5 5 0 001.414-1.414"></path><circle cx="12" cy="12" r="1"></circle></svg>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-green-500 rounded-full animate-pulse group-[.active]:block hidden"></span>
                </div>
                <span class="text-[9px] uppercase tracking-tighter opacity-40 group-[.active]:opacity-100">Live</span>
            </div>
        </button>
        <button onclick="switchScreen('stats')" class="nav-item group" data-screen="stats">
            <div class="flex flex-col items-center">
                <svg class="w-6 h-6 mb-1 opacity-40 group-[.active]:opacity-100 group-[.active]:text-blue-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-[9px] uppercase tracking-tighter opacity-40 group-[.active]:opacity-100">Stats</span>
            </div>
        </button>
    </nav>

    <script src="app.js" type="module"></script>
</body>
</html>
