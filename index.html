<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padel Club Riga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <header>
            <h1 class="neon-text">PADEL RIGA</h1>
        </header>

        <main id="main-content">
            <div id="screen-tournaments" class="screen active">
                <div id="tournament-list"></div>
            </div>
            
            <div id="screen-matches" class="screen">
                <h2 class="screen-title">LIVE МАТЧИ</h2>
                <div id="all-matches-list"></div>
            </div>

            <div id="screen-detail" class="screen">
                <button class="btn-back" onclick="App.switchTab('tournaments')">← Назад</button>
                <div id="match-container"></div>
            </div>

            <div id="screen-stats" class="screen">
                <h2 class="screen-title">РЕЙТИНГ ИГРОКОВ</h2>
                <div id="leaderboard"></div>
            </div>

            <div id="screen-profile" class="screen">
                <h2 class="screen-title">МОЙ ПРОФИЛЬ</h2>
                <div id="user-profile"></div>
            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
