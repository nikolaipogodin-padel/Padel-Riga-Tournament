<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Padel Riga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="header">
        <div class="flex items-center gap-3">
            <div class="logo-box">P</div>
            <span class="logo-text">Padel <span class="text-[#BFFF00]">Riga</span></span>
        </div>
        <div id="status-badge" class="hidden status-pill">Cloud Sync</div>
    </header>

    <main id="app-container">
        <section id="screen-registration" class="screen">
            <div class="px-6 pt-4">
                <div class="flex flex-col items-center mb-8">
                    <div class="relative group" onclick="document.getElementById('avatar-input').click()">
                        <div class="avatar-placeholder" id="avatar-preview">👤</div>
                        <div class="avatar-plus">+</div>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*">
                    </div>
                    <p class="text-[9px] text-gray-600 uppercase mt-3 font-black tracking-[0.2em]">Add Photo</p>
                </div>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="reg-firstname" placeholder="Имя" class="premium-input text-sm">
                        <input type="text" id="reg-lastname" placeholder="Фамилия" class="premium-input text-sm">
                    </div>
                    <div class="flex gap-3">
                        <div class="premium-input text-gray-500 text-sm w-16 text-center italic">+371</div>
                        <input type="tel" id="reg-phone" placeholder="Номер" class="flex-1 premium-input text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="reg-gender" class="premium-input text-sm appearance-none">
                            <option value="male">Мужской пол</option>
                            <option value="female">Женский пол</option>
                        </select>
                        <select id="reg-level" class="premium-input text-sm appearance-none">
                            <option value="4.0">Уровень 4.0</option>
                            <option value="3.0">Уровень 3.0</option>
                            <option value="5.0">Уровень 5.0</option>
                        </select>
                    </div>
                    <input type="password" id="reg-password" placeholder="Пароль" class="w-full premium-input text-sm">
                    <button onclick="auth.signUp()" id="reg-btn" class="main-btn">Регистрация</button>
                </div>
            </div>
        </section>

        <section id="screen-tournaments" class="screen">
            <div class="p-6 space-y-8">
                <div>
                    <h2 class="section-title">Мои Турниры</h2>
                    <div id="my-tournaments" class="space-y-4"></div>
                </div>
                <div>
                    <h2 class="section-title">Доступные</h2>
                    <div id="available-tournaments" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <section id="screen-live-match" class="screen">
            <div class="p-6">
                <button onclick="ui.navigate('screen-tournaments')" class="text-[#BFFF00] text-[10px] font-black uppercase mb-6 flex items-center gap-2">← Назад</button>
                <div class="premium-card p-8 text-center pulse-glow">
                    <div class="text-[#BFFF00] text-[10px] font-black uppercase mb-2 tracking-widest">Твой матч идет сейчас</div>
                    <div class="text-5xl font-black italic uppercase text-white mb-6">Корт 2</div>
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div class="text-left">
                            <p class="text-[9px] text-gray-500 uppercase font-black">Твоя пара</p>
                            <p class="text-sm font-bold text-white uppercase" id="live-my-pair">Вы + Напарник</p>
                        </div>
                        <div class="text-[#BFFF00] font-black">VS</div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-500 uppercase font-black">Соперники</p>
                            <p class="text-sm font-bold text-white uppercase">Иванов / Петров</p>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-white/10 text-white rounded-2xl mt-8 font-black uppercase text-[10px] border border-white/10">Ввести результат</button>
                </div>
            </div>
        </section>

        <section id="screen-bracket" class="screen">
            <div class="p-6">
                <button onclick="ui.navigate('screen-tournaments')" class="text-[#BFFF00] text-[10px] font-black uppercase mb-6 flex items-center gap-2">← Назад</button>
                <h2 class="text-2xl font-black italic uppercase mb-6">Сетка турнира</h2>
                <div class="space-y-3">
                    <div class="premium-card p-4 flex justify-between items-center opacity-80">
                        <span class="text-[10px] font-black text-gray-500 uppercase">Матч 1</span>
                        <span class="text-xs font-bold uppercase text-white">Вы/Партер vs Смит/Джонс</span>
                        <span class="text-[#BFFF00] text-[10px] font-black uppercase">Live</span>
                    </div>
                    <div class="premium-card p-4 flex justify-between items-center opacity-40">
                        <span class="text-[10px] font-black text-gray-500 uppercase">Матч 2</span>
                        <span class="text-xs font-bold uppercase text-white">Кан/Берг vs Ли/Ван</span>
                        <span class="text-gray-500 text-[10px] font-black uppercase">Wait</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="screen-profile" class="screen">
            <div class="flex flex-col items-center pt-12 pb-8">
                <div class="profile-avatar shadow-glow">👤</div>
                <h2 id="p-name" class="text-2xl font-black uppercase text-white tracking-tighter">---</h2>
                <p id="p-id" class="text-[#BFFF00] text-[10px] font-black uppercase mt-1 tracking-widest italic opacity-80">ID: ---</p>
            </div>
            <div class="px-6 mt-10">
                <button onclick="auth.logout()" class="w-full py-4 text-red-500/60 text-[10px] font-black uppercase tracking-[0.2em] border border-red-500/10 rounded-2xl bg-red-500/5">Выйти</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" id="nav-tournaments" onclick="ui.navigate('screen-tournaments')">🏆</button>
        <button class="nav-item" id="nav-profile" onclick="ui.navigate('screen-profile')">👤</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
