<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Padel Riga Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-black text-white font-sans overflow-x-hidden">
  <div id="app" class="min-h-screen flex flex-col pb-24"></div>

  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-opacity-90 bg-zinc-900 border-t border-white/5 pb-6 pt-3 px-6 flex justify-between items-center z-50 backdrop-blur-lg hidden">
    <button onclick="window.router.navigate('dashboard')" class="nav-btn flex flex-col items-center gap-1 opacity-50" data-screen="dashboard">
      <div class="w-6 h-6 flex items-center justify-center">🏆</div>
      <span class="text-[10px] font-medium uppercase tracking-widest">Турниры</span>
    </button>
    <button onclick="window.router.navigate('live')" class="nav-btn flex flex-col items-center gap-1 opacity-50" data-screen="live">
      <div class="w-6 h-6 flex items-center justify-center relative">
        <div class="absolute -top-1 -right-1 w-2 h-2 bg-lime-400 rounded-full animate-pulse"></div>
        🎾
      </div>
      <span class="text-[10px] font-medium uppercase tracking-widest">Live</span>
    </button>
    <button onclick="window.router.navigate('profile')" class="nav-btn flex flex-col items-center gap-1 opacity-50" data-screen="profile">
      <div class="w-6 h-6 flex items-center justify-center">👤</div>
      <span class="text-[10px] font-medium uppercase tracking-widest">Профиль</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
